model:
  # Feature Extractor
  hubert_model: "facebook/hubert-base-ls960"
  hubert_layer: 9
  freeze_hubert: true
  
  # =========================================
  # QUANTIZER
  # =========================================
  quantizer_type: "rfsq"
  fsq_levels: [8, 8, 8, 8, 8, 8, 8, 8]
  rfsq_num_levels: 3
  
  # =========================================
  # SEMANTIC
  # =========================================
  semantic:
    input_dim: 768
    hidden_dim: 256
    output_dim: 8
    temporal_compression: 2
    vocab_size: 256
    
  # =========================================
  # PROSODY
  # =========================================
  prosody:
    input_dim: 768
    hidden_dim: 128
    output_dim: 8
    temporal_compression: 8
    vocab_size: 256
    
  # Speaker
  speaker:
    embedding_dim: 256
    num_groups: 8
    codes_per_group: 256
    
  # Decoder - Matches Checkpoint Dimensions
  decoder:
    fusion_dim: 512
    sem_dim: 256
    pro_dim: 128
    spk_dim: 128
    fusion_heads: 8
    fusion_layers: 6
    dropout: 0.1
        
  # Vocoder - Matches NeuralVocoderBit expectation
  bit_vocoder:
    dim: 512
    num_layers: 12
    num_res_blocks: 4

  # Legacy section just in case
  vocoder:
    type: "bitvocoder"
    dim: 512
    num_convnext_layers: 12
    num_res_blocks: 4

training:
  batch_size: 16
  learning_rate: 5e-5
  warmup_steps: 2000
  max_steps: 150000
  num_workers: 4
  persistent_workers: false
  use_gan: false
  
  commitment_weight: 0.25
  stft_weight: 15.0
  bandwise_mel_weight: 10.0
  waveform_weight: 2.0
  spectral_flux_weight: 2.0
  diversity_weight: 0.1
  entropy_weight: 0.01
  sharpener_enabled: true
  
  log_every: 100
  eval_every: 3000
  save_every: 500
  
data:
  train_manifest: "./data/mixed_train.json"
  val_manifest: "./data/mixed_val.json"
  feature_dir: "./data/features_mixed"
  sample_rate: 16000
  max_duration: 15.0
  min_duration: 1.0
  multi_speaker: true
  num_speakers: -1

audio:
  sample_rate: 16000
  hop_length: 320
