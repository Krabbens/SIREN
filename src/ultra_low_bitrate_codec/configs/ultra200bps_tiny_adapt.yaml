# Config for TinyHubert Factorizer Adaptation
# Based on ultra200bps_large.yaml but modified for TinyHubert adaptation

model:
  # Feature Extractor - USING TINYHUBERT (768d)
  # But we feed precomputed features, so this is just for reference/inference instantiation
  hubert_model: "tiny_hubert" 
  hubert_layer: -1 # Not used for precomputed
  freeze_hubert: true
  
  # =========================================
  # QUANTIZER - KEEP SAME as checkpoint
  # =========================================
  quantizer_type: "rfsq"
  fsq_levels: [5, 5, 5, 5] # Reduced to 4 dims for ultra-low bitrate
  rfsq_num_levels: 3 # Wait, if dim is 4, FSQ expects 4 levels.
  
  # =========================================
  # SEMANTIC - 195 bps settings
  # =========================================
  semantic:
    input_dim: 768  # TinyHubert is 768d
    hidden_dim: 256
    output_dim: 4 # Reduced from 8 to 4 for < 300 bps target
    temporal_compression: 2
    vocab_size: 256
    
  # =========================================
  # PROSODY - High Rate settings from checkpoint
  # =========================================
  prosody:
    input_dim: 768
    hidden_dim: 128
    output_dim: 4 # Reduced from 8 to 4
    temporal_compression: 8
    vocab_size: 256
    
  # Speaker
  speaker:
    embedding_dim: 256
    num_groups: 8
    codes_per_group: 256
    
  # Entropy Coding
  entropy:
    enabled: true
    lm_layers: 2
    lm_dim: 128
    lm_heads: 4
    context_length: 32 # Reduced from 4096 to prevent overfitting
    vocab_size: 256

  # Decoder - Matching Checkpoint (Hybrid Concat Fusion)
  decoder:
    fusion_dim: 512 # Final Transformer D_Model (256+128+128)
    sem_dim: 256
    pro_dim: 128
    spk_dim: 128
    fusion_heads: 8
    fusion_layers: 6
    dropout: 0.1
        
  # Vocoder - KEEP SAME
  vocoder:
    type: "bitvocoder"
    dim: 512
    num_convnext_layers: 12
    num_res_blocks: 4
    
  bit_vocoder:
    dim: 512
    num_layers: 12
    num_res_blocks: 4

training:
  batch_size: 8
  learning_rate: 1e-4  # Standard LR for fresh training
  warmup_steps: 2000   # Standard warmup
  max_steps: 200000    # Resume from 120000 -> +80k steps adaptation
  num_workers: 8
  persistent_workers: false
  
  use_gan: false
  
  # Loss weights
  stft_weight: 15.0
  bandwise_mel_weight: 10.0
  waveform_weight: 2.0
  spectral_flux_weight: 2.0
  
  diversity_weight: 0.1
  entropy_weight: 0.0   # Disabled to force encoder to learn diversity (Fix for BPS=0)
  
  sharpener_enabled: true
  
  log_every: 100
  eval_every: 1000     # Frequent eval
  save_every: 2000
  
data:
  train_manifest: "data/mixed_train.json"
  val_manifest: "data/mixed_val.json"
  feature_dir: "data/features_tiny_train" # Points to NEW TinyHubert features
  sample_rate: 16000
  max_duration: 15.0
  min_duration: 1.0
  
  multi_speaker: true
  num_speakers: -1

audio:
  sample_rate: 16000
  hop_length: 320
