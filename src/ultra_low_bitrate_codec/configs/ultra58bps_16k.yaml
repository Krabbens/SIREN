# V8 @ ~110 bps nominal streaming (sem+pro FSQ, uniform codes). Filename kept for tooling paths.
# Semantic widened to ~100 bps to reduce FSQ collapse vs ultra-narrow 16-code bottleneck.
# Fallback with ~2× semantic rate + wider FSQ (~230 bps nominal): ultra230bps_16k.yaml
# 16 kHz, BitHuBERT 50 Hz features.
#
# Nominal math (see ultra_low_bitrate_codec.pipeline.v8_conditioning.nominal_bitrate_v8):
#   Semantic:  50/4 Hz × log2(4^4) = 12.5 × 8 = 100.0 bps   ([4,4,4,4] → 256 codes)
#   Prosody:   50/16 Hz × log2(3^2) = 3.125 × log2(9) ≈ 9.9 bps ([3,3] → 9 codes)
#   Streaming: ~109.9 bps (nominal FSQ; entropy coding can be lower)
#   Speaker FSQ (per utterance): log2(8^4) = 12 bits — amortize over length; not in streaming bps above.

model:
  hubert_model: "facebook/hubert-base-ls960"
  hubert_layer: 9
  freeze_hubert: true
  cnn_dim: 384

  quantizer_type: "rfsq"
  fsq_levels: [4, 4, 4, 4]
  rfsq_num_levels: 1

  semantic:
    input_dim: 768
    hidden_dim: 256
    output_dim: 4
    temporal_compression: 4
    vocab_size: 256

  prosody:
    input_dim: 768
    hidden_dim: 128
    output_dim: 2
    temporal_compression: 16
    vocab_size: 9
    fsq_levels: [3, 3]

  speaker:
    embedding_dim: 256
    quantized: true
    fsq_levels: [8, 8, 8, 8]

  decoder:
    fusion_dim: 768
    cond_dim: 262
    fusion_heads: 8
    fusion_layers: 6
    dropout: 0.1

  vocoder:
    type: "bitvocos"
    dim: 768
    num_convnext_layers: 12
    num_res_blocks: 4
    sample_rate: 16000
    hop_length: 640

training:
  batch_size: 32
  learning_rate: 1e-4
  warmup_steps: 1000
  weight_decay: 0.01
  grad_clip: 0.5
  # FSQ vs recon + anti-collapse: noise pre-FSQ, spread on global + batch-axis std (train_v8_vqvae.py).
  # After a restart, read Code stats for epochs 0–2 at minimum: ep1 alone can look OK then ep2 collapses.
  # Slightly lower recon so FSQ terms are not drowned; spk weight must be high vs sem (4096 codes).
  recon_weight: 0.14
  quant_loss_weight: 4.55
  quant_loss_sem_weight: 92.0
  quant_loss_pro_weight: 86.0
  quant_loss_spk_weight: 58.0
  # Per-branch FSQ scale (train + eval); omit sem/pro keys to use fsq_input_scale for both.
  fsq_input_scale: 2.5
  fsq_sem_input_scale: 2.95
  fsq_pro_input_scale: 4.15
  fsq_input_noise_std: 0.22
  fsq_sem_noise_std: 0.14
  fsq_pro_noise_std: 0.26
  fsq_spk_noise_std: 0.24
  spread_weight: 0.68
  spread_floor: 0.04
  spk_spread_weight: 0.62
  spk_spread_floor: 0.055
  # Per-branch diversity (avoids one branch eating the shared cap; pro was H>0 while sem stayed 1 code).
  latent_diversity_weight: 0.0
  latent_diversity_sem_weight: 0.36
  latent_diversity_pro_weight: 0.42
  latent_diversity_sem_cap: 0.5
  latent_diversity_pro_cap: 0.26
  # Differentiable batch Gram log-det (train_v8_vqvae._batch_gram_logdet_term): rewards spread of
  # pooled latents across the minibatch — surrogate for code diversity, not discrete entropy.
  batch_gram_logdet_eps: 0.001
  batch_gram_logdet_sem_weight: 0.022
  batch_gram_logdet_pro_weight: 0.022
  batch_gram_logdet_spk_weight: 0.035
  num_workers: 4
  prefetch_factor: 2
  amp: true
  grad_accum_steps: 1
  cudnn_benchmark: true
  stats_batches: 16

audio:
  sample_rate: 16000
  hop_length: 320
  n_fft: 1024
  n_mels: 80
